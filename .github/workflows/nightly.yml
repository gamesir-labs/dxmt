name: DXMT Push CI

on:
  workflow_dispatch:
  push:
    branches:
    - "**"

permissions:
  contents: read

concurrency:
  group: push-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  LLVM_VERSION: llvmorg-15.0.7
  WINE_VERSION: proton-11.0-macos
  WINE_GIT_URL: https://github.com/gamesir123/wine-proton-macos.git
  WINE_GIT_BRANCH: proton-11.0-macos
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  classify-commits:
    runs-on: self-macos-runner
    outputs:
      commit_markdown: ${{ steps.commit-types.outputs.commit_markdown }}
      commit_types: ${{ steps.commit-types.outputs.types }}
      has_test: ${{ steps.commit-types.outputs.has_test }}
      run_nightly: ${{ steps.commit-types.outputs.run_nightly }}
      conventional_valid: ${{ steps.commit-types.outputs.conventional_valid }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Validate and classify all pushed commits
        id: commit-types
        env:
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          python3 .github/scripts/commit-types.py \
            --event "${GITHUB_EVENT_PATH}" \
            --fallback-commit "${HEAD_SHA}"

  setup-host:
    runs-on: self-macos-runner
    needs: classify-commits
    if: ${{ github.event_name == 'workflow_dispatch' || needs.classify-commits.outputs.run_nightly == 'true' }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Probe and Prepare Host
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          scripts/ci-self-hosted.sh --config .github/dxmt-builder-config.json setup-host
          scripts/dxmt-builder --config .github/dxmt-builder-config.json --help

  windows-d3d-conformance:
    name: Windows D3D Public API Conformance
    needs: classify-commits
    if: ${{ needs.classify-commits.outputs.has_test == 'true' }}
    uses: ./.github/workflows/windows-d3d-conformance.yml

  setup-wine:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Prepare Wine
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
          WINE_ACCESS_TOKEN: ${{ secrets.WINE_ACCESS_TOKEN }}
        run: |
          case "${WINE_ACCESS_TOKEN}" in
            ghp_*) echo "Wine token kind: classic" ;;
            github_pat_*) echo "Wine token kind: fine-grained" ;;
            "") echo "::error::WINE_ACCESS_TOKEN is empty"; exit 1 ;;
            *) echo "Wine token kind: unknown" ;;
          esac
          # Same build-cli path as local: fetch remote Wine tip + incremental make.
          scripts/dxmt-builder --config .github/dxmt-builder-config.json bootstrap wine-x64

  setup-llvm-project:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Prepare LLVM Source
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/dxmt-builder --config .github/dxmt-builder-config.json bootstrap llvm-project

  setup-llvm-darwin:
    runs-on: self-macos-runner
    needs: setup-llvm-project
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Prepare LLVM Darwin x86_64
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/dxmt-builder --config .github/dxmt-builder-config.json bootstrap llvm-darwin-x64

  build-x86_64-windows:
    runs-on: self-macos-runner
    needs: [setup-wine, setup-llvm-darwin]
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Checkout Build Submodules
        run: git submodule update --init --depth=1 external/apitrace external/nvapi include/native/directx

      - name: Build x86_64 Wine Builtin Runtime
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          profile=gcc-x64-release-full
          install_dir="$(scripts/dxmt-builder --config .github/dxmt-builder-config.json \
            config profile-path --profile "${profile}" install)"
          short_sha="$(git rev-parse --short=7 HEAD)"
          scripts/ci-self-hosted.sh --config .github/dxmt-builder-config.json prepare-job
          # Push nightlies only build/package runtime. Full tests stay in
          # "DXMT Nightly Component" (manual backend publish workflow).
          DXMT_BUILDER_DXMT_VERSION="${short_sha}" scripts/dxmt-builder \
            --config .github/dxmt-builder-config.json build \
            --profile "${profile}" runtime
          DXMT_BUILDER_DXMT_VERSION="${short_sha}" scripts/dxmt-builder \
            --config .github/dxmt-builder-config.json install \
            --profile "${profile}" --component runtime
          find "${install_dir}/usr/local" -name '*.a' -delete
          scripts/ci-self-hosted.sh --config .github/dxmt-builder-config.json \
            stage-artifact nightly-x86_64-runtime "${install_dir}/usr/local"

      # Temporary: exercises the isolation transform and the re-run path.
      # Never fails the job.
      - name: Probe the Wine conformance re-run path
        continue-on-error: true
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          set +e
          scripts/dxmt-builder --config .github/dxmt-builder-config.json \
            test --profile gcc-x64-release-full unit --suite d3d9 \
            > d3d9-isolate-probe.log 2>&1
          echo "d3d9 suite exit: $?"
          tail -70 d3d9-isolate-probe.log
          exit 0

      - name: Upload isolation probe log
        if: always()
        continue-on-error: true
        uses: actions/upload-artifact@v4
        with:
          name: d3d9-isolate-probe-${{ github.sha }}-${{ github.run_attempt }}
          path: d3d9-isolate-probe.log
          if-no-files-found: warn
          retention-days: 7

  package:
    runs-on: self-macos-runner
    needs: [build-x86_64-windows]
    env:
      COMPONENT_NAME: dxmt-nightly
    outputs:
      short_sha: ${{ steps.version.outputs.short_sha }}
      package_name: ${{ steps.version.outputs.package_name }}
      artifact_name: ${{ steps.version.outputs.artifact_name }}
      package_size: ${{ steps.package-metadata.outputs.package_size }}
      package_sha256: ${{ steps.package-metadata.outputs.package_sha256 }}
      artifact_url: ${{ steps.upload.outputs.artifact-url }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Compute Nightly Version
        id: version
        run: |
          short_sha="$(git rev-parse --short=7 HEAD)"
          package_name="${COMPONENT_NAME}-${short_sha}"
          artifact_name="${COMPONENT_NAME}-component-${short_sha}"
          {
            echo "short_sha=${short_sha}"
            echo "package_name=${package_name}"
            echo "artifact_name=${artifact_name}"
            echo "package_root_name=${COMPONENT_NAME}"
            echo "package_file=dist/${package_name}.tzst"
          } >> "$GITHUB_OUTPUT"

      - name: Assemble Nightly Package
        run: |
          short_sha="${{ steps.version.outputs.short_sha }}"
          package_name="${{ steps.version.outputs.package_name }}"
          package_root_name="${{ steps.version.outputs.package_root_name }}"
          package_root=".cache/package/combined/${package_root_name}"
          rm -rf .cache/package/combined ./dist
          mkdir -p "${package_root}/wine" ./dist

          scripts/ci-self-hosted.sh --config .github/dxmt-builder-config.json \
            copy-artifact nightly-x86_64-runtime "${package_root}/wine"
          find "${package_root}" -name '*.a' -delete

          python3 - "${package_root}/manifest.json" "${package_root_name}" "${package_name}" "${short_sha}" <<'PY'
          import json
          import sys

          manifest_path, component_id, package_name, version = sys.argv[1:]
          manifest = {
              "id": component_id,
              "name": package_name,
              "version": version,
              "link_unix_libs": [
                  "${COMPONENT_PATH}/wine/x86_64-unix",
              ],
              "link_windows_dlls": [
                  "${COMPONENT_PATH}/wine/x86_64-windows",
              ],
              "environment_template": {
                  "WINEDLLPATH": "${COMPONENT_PATH}/wine",
              },
          }
          with open(manifest_path, "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PY

      - name: Verify Component Package Layout
        run: |
          short_sha="${{ steps.version.outputs.short_sha }}"
          package_name="${{ steps.version.outputs.package_name }}"
          package_root_name="${{ steps.version.outputs.package_root_name }}"
          package_root=".cache/package/combined/${package_root_name}"
          test ! -e ".cache/package/combined/${package_name}"
          test -f "${package_root}/manifest.json"
          test -d "${package_root}/wine/x86_64-windows"
          test -d "${package_root}/wine/x86_64-unix"
          test -f "${package_root}/wine/x86_64-windows/dxgi.dll"
          test -f "${package_root}/wine/x86_64-unix/winemetal.so"
          find "${package_root}" -maxdepth 1 -mindepth 1 \
            ! -name manifest.json \
            ! -name wine \
            -exec sh -c 'echo "unexpected package entry: $1" >&2; exit 1' sh {} \;
          python3 - "${package_root}/manifest.json" "${package_root_name}" "${package_name}" "${short_sha}" <<'PY'
          import json
          import sys

          manifest_path, component_id, package_name, version = sys.argv[1:]
          with open(manifest_path, "r", encoding="utf-8") as f:
              manifest = json.load(f)
          expected = {
              "id": component_id,
              "name": package_name,
              "version": version,
          }
          actual = {key: manifest.get(key) for key in expected}
          if actual != expected:
              raise SystemExit(f"unexpected manifest identity: {actual} != {expected}")
          PY

      - name: Create Component Archive
        run: |
          if ! command -v zstd >/dev/null 2>&1; then
            brew install --formula zstd
          fi
          package_root_name="${{ steps.version.outputs.package_root_name }}"
          package_file="${{ steps.version.outputs.package_file }}"
          tar -cf - -C .cache/package/combined "${package_root_name}" | zstd -T0 -19 -o "${package_file}"
          case "${package_file}" in
            *.tzst) ;;
            *) echo "::error::component archive must end with .tzst"; exit 1 ;;
          esac
          zstd -t "${package_file}"
          shasum -a 256 "${package_file}" > "${package_file}.sha256"
          # Push nightlies do not run the test suite; record that explicitly.
          {
            echo "tests_passed=false"
            echo "tests_required=false"
            echo "reason=skipped_on_push_nightly"
          } > "${package_file}.builder-metadata"

      - name: Compute Component Package Metadata
        id: package-metadata
        run: |
          package_file="${{ steps.version.outputs.package_file }}"
          package_size="$(wc -c < "${package_file}" | tr -d '[:space:]')"
          package_sha256="$(awk 'NR == 1 { print $1 }' "${package_file}.sha256")"
          [[ "${package_size}" =~ ^[0-9]+$ ]] || {
            echo "::error::invalid package size: ${package_size}"
            exit 1
          }
          [[ "${package_sha256}" =~ ^[0-9a-f]{64}$ ]] || {
            echo "::error::invalid package SHA256: ${package_sha256}"
            exit 1
          }
          {
            echo "package_size=${package_size}"
            echo "package_sha256=${package_sha256}"
          } >> "$GITHUB_OUTPUT"

      - name: Stage Nightly Package
        run: |
          scripts/ci-self-hosted.sh --config .github/dxmt-builder-config.json \
            stage-files "${{ steps.version.outputs.artifact_name }}" \
            "${{ steps.version.outputs.package_file }}" \
            "${{ steps.version.outputs.package_file }}.sha256" \
            "${{ steps.version.outputs.package_file }}.builder-metadata"

      - name: Upload Nightly Package
        id: upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.artifact_name }}
          path: |
            ${{ steps.version.outputs.package_file }}
            ${{ steps.version.outputs.package_file }}.sha256
            ${{ steps.version.outputs.package_file }}.builder-metadata
          if-no-files-found: error
          retention-days: 14

  cleanup-runner-artifacts:
    runs-on: self-macos-runner
    needs: [classify-commits, package]
    if: ${{ always() && needs.classify-commits.result == 'success' && (github.event_name == 'workflow_dispatch' || needs.classify-commits.outputs.run_nightly == 'true') }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Prune Runner Artifacts
        run: scripts/ci-self-hosted.sh --config .github/dxmt-builder-config.json prune-artifact-runs 3

  notify:
    name: Notify Feishu with CI summary
    # Stay on the Nightly macOS runner pool; do not hop to Windows.
    runs-on: self-macos-runner
    needs: [classify-commits, setup-host, setup-wine, setup-llvm-project, setup-llvm-darwin, build-x86_64-windows, package, cleanup-runner-artifacts, windows-d3d-conformance]
    if: ${{ always() }}
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
    steps:
      - name: Checkout notify helper
        uses: actions/checkout@v6
        with:
          # Full tree; avoid sparse residue on the shared macOS runner.
          clean: true

      - name: Send aggregated CI result to Feishu
        env:
          COMMIT_MARKDOWN: ${{ needs.classify-commits.outputs.commit_markdown }}
          COMMIT_TYPES: ${{ needs.classify-commits.outputs.commit_types }}
          RUN_NIGHTLY: ${{ github.event_name == 'workflow_dispatch' || needs.classify-commits.outputs.run_nightly == 'true' }}
          RUN_WINDOWS_D3D: ${{ needs.classify-commits.outputs.has_test == 'true' }}
        run: |
          set -euo pipefail
          chmod +x .github/scripts/ci-feishu.sh
          status_label() {
            case "$1" in
              success) .github/scripts/ci-feishu.sh label passed ;;
              skipped) .github/scripts/ci-feishu.sh label skipped ;;
              cancelled) .github/scripts/ci-feishu.sh label cancelled ;;
              *) .github/scripts/ci-feishu.sh label failed ;;
            esac
          }

          linked_status() {
            printf '[%s](%s)' "$(status_label "$1")" "$2"
          }

          failed=()
          [[ '${{ needs.classify-commits.result }}' == 'success' ]] || failed+=('commit-policy')
          if [[ "${RUN_NIGHTLY}" == 'true' ]]; then
            [[ '${{ needs.setup-host.result }}' == 'success' ]] || failed+=('setup-host')
            [[ '${{ needs.setup-wine.result }}' == 'success' ]] || failed+=('setup-wine')
            [[ '${{ needs.setup-llvm-project.result }}' == 'success' ]] || failed+=('setup-llvm-project')
            [[ '${{ needs.setup-llvm-darwin.result }}' == 'success' ]] || failed+=('setup-llvm-darwin')
            [[ '${{ needs.build-x86_64-windows.result }}' == 'success' ]] || failed+=('build-x86_64-windows')
            [[ '${{ needs.package.result }}' == 'success' ]] || failed+=('package')
            [[ '${{ needs.cleanup-runner-artifacts.result }}' == 'success' ]] || failed+=('cleanup-runner-artifacts')
          fi
          if [[ "${RUN_WINDOWS_D3D}" == 'true' ]]; then
            [[ '${{ needs.windows-d3d-conformance.result }}' == 'success' ]] || failed+=('windows-d3d-conformance')
          fi

          if ((${#failed[@]} == 0)); then
            title="$(.github/scripts/ci-feishu.sh label ci_ok)"
            theme=green
          else
            title="$(.github/scripts/ci-feishu.sh label ci_fail)"
            theme=red
          fi

          run_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          identity_md="$(printf '%s\n' \
            "**$(.github/scripts/ci-feishu.sh label repo):** ${{ github.repository }}" \
            "**$(.github/scripts/ci-feishu.sh label commit):** \`${{ github.sha }}\`" \
            "**$(.github/scripts/ci-feishu.sh label branch):** ${{ github.ref_name }}" \
            "**$(.github/scripts/ci-feishu.sh label author):** ${{ github.actor }}" \
            "**$(.github/scripts/ci-feishu.sh label commit_types):** ${COMMIT_TYPES}")"
          commits_md="$(printf '%s\n' \
            "**$(.github/scripts/ci-feishu.sh label commits):**" \
            "${COMMIT_MARKDOWN}")"
          ci_lines=(
            "**$(.github/scripts/ci-feishu.sh label conventional_result):** $(linked_status '${{ needs.classify-commits.result }}' "${run_url}")"
          )
          if [[ "${RUN_NIGHTLY}" == 'true' ]]; then
            ci_lines+=("**$(.github/scripts/ci-feishu.sh label nightly_result):** $(linked_status '${{ needs.package.result }}' "${run_url}")")
          fi
          if [[ "${RUN_WINDOWS_D3D}" == 'true' ]]; then
            ci_lines+=("**$(.github/scripts/ci-feishu.sh label d3d_result):** $(linked_status '${{ needs.windows-d3d-conformance.result }}' "${run_url}")")
          fi
          results_md="$(printf '%s\n' \
            "**$(.github/scripts/ci-feishu.sh label ci_runs):**" \
            "${ci_lines[@]}")"
          sections=("${identity_md}" "${commits_md}" "${results_md}")

          if [[ '${{ needs.package.result }}' == 'success' ]]; then
            package_md="$(printf '%s\n' \
              "**$(.github/scripts/ci-feishu.sh label version):** ${{ needs.package.outputs.package_name }}" \
              "**📦 $(.github/scripts/ci-feishu.sh label component_package):** [$(.github/scripts/ci-feishu.sh label download)](${{ needs.package.outputs.artifact_url }})" \
              "**$(.github/scripts/ci-feishu.sh label size):** ${{ needs.package.outputs.package_size }} bytes" \
              "**SHA256:** \`${{ needs.package.outputs.package_sha256 }}\`")"
            sections+=("${package_md}")
          fi

          if ((${#failed[@]} > 0)); then
            failed_jobs=$(IFS=', '; echo "${failed[*]}")
            failure_md="**$(.github/scripts/ci-feishu.sh label failed_jobs):** ${failed_jobs}"
            sections+=("${failure_md}")
          fi

          run_md="**$(.github/scripts/ci-feishu.sh label run_link):** [$(.github/scripts/ci-feishu.sh label view_detail)](${run_url})"
          sections+=("${run_md}")
          .github/scripts/ci-feishu.sh send-card-v1 \
            "${FEISHU_WEBHOOK_URL}" \
            "${title}" \
            "${theme}" \
            "${sections[@]}"
