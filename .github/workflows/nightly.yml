name: Nightly Build

on:
  workflow_dispatch:
  push:
    branches:
    - main

permissions:
  contents: read

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

env:
  DXMT_CI_ROOT: /opt/dxmt-ci
  LLVM_VERSION: llvmorg-15.0.7
  WINE_VERSION: v8.16-3shain
  WINE_URL: https://github.com/3Shain/wine/releases/download/v8.16-3shain/wine.tar.gz
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  setup-host:
    runs-on: self-macos-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Probe and Prepare Host
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh setup-host

  setup-wine:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Wine
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh ensure-wine x86_64

  setup-llvm-project:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare LLVM Source
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh ensure-llvm-project

  setup-llvm-darwin:
    runs-on: self-macos-runner
    needs: setup-llvm-project
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare LLVM Darwin x86_64
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh ensure-llvm-darwin x86_64

  build-x86_64-windows:
    runs-on: self-macos-runner
    needs: [setup-wine, setup-llvm-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build x86_64 Wine Builtin Runtime
        run: |
          scripts/ci-self-hosted.sh prepare-job
          scripts/ci-self-hosted.sh link-toolchains x86_64
          scripts/ci-self-hosted.sh prepare-ccache nightly-x86_64 x86_64-w64-mingw32-gcc x86_64-w64-mingw32-g++
          meson setup --cross-file build-win64.txt \
            -Denable_nvapi=true \
            -Denable_nvngx=true \
            -Dnative_llvm_path=toolchains/llvm-darwin \
            -Dwine_build_path= -Dwine_install_path=toolchains/wine \
            --buildtype release \
            --prefix "$(pwd)/install" \
            --strip \
            build
          meson compile -C build
          meson install -C build
          find install -name '*.a' -delete
          ccache --show-stats
          scripts/ci-self-hosted.sh stage-artifact nightly-x86_64-runtime install

  build-x86-windows:
    runs-on: self-macos-runner
    needs: setup-wine
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build x86 Wine Builtin Runtime
        run: |
          scripts/ci-self-hosted.sh prepare-job
          scripts/ci-self-hosted.sh link-toolchains x86_64
          scripts/ci-self-hosted.sh prepare-ccache nightly-x86 i686-w64-mingw32-gcc i686-w64-mingw32-g++
          meson setup --cross-file build-win32.txt \
            -Dwine_build_path= -Dwine_install_path=toolchains/wine \
            --buildtype release \
            --prefix "$(pwd)/install" \
            --strip \
            build
          meson compile -C build
          meson install -C build
          find install -name '*.a' -delete
          ccache --show-stats
          scripts/ci-self-hosted.sh stage-artifact nightly-x86-runtime install

  package:
    runs-on: self-macos-runner
    needs: [build-x86_64-windows, build-x86-windows]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute Nightly Version
        id: version
        run: |
          short_sha="${GITHUB_SHA::7}"
          package_name="dxmt-nightly-${short_sha}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"

      - name: Assemble Nightly Package
        run: |
          package_dir="./combined/${{ steps.version.outputs.package_name }}"
          scripts/ci-self-hosted.sh copy-artifact nightly-x86_64-runtime "${package_dir}"
          scripts/ci-self-hosted.sh copy-artifact nightly-x86-runtime "${package_dir}"
          cp LICENSE COPYING.LIB "${package_dir}/"
          find "${package_dir}" -name '*.a' -delete
          test ! -d "${package_dir}/system32"

      - name: Verify Builtin Package Layout
        run: |
          package_dir="./combined/${{ steps.version.outputs.package_name }}"
          test -d "${package_dir}/i386-windows"
          test -d "${package_dir}/x86_64-windows"
          test -d "${package_dir}/x86_64-unix"
          test -f "${package_dir}/LICENSE"
          test -f "${package_dir}/COPYING.LIB"
          find "${package_dir}" -maxdepth 1 -mindepth 1 \
            ! -name i386-windows \
            ! -name x86_64-windows \
            ! -name x86_64-unix \
            ! -name LICENSE \
            ! -name COPYING.LIB \
            -exec sh -c 'echo "unexpected package entry: $1" >&2; exit 1' sh {} \;

      - name: Create Nightly Tarball
        run: |
          tar -czf "${{ steps.version.outputs.package_name }}.tar.gz" -C ./combined "${{ steps.version.outputs.package_name }}"
          shasum -a 256 "${{ steps.version.outputs.package_name }}.tar.gz" > "${{ steps.version.outputs.package_name }}.tar.gz.sha256"

      - name: Stage Nightly Package
        run: |
          scripts/ci-self-hosted.sh stage-files "${{ steps.version.outputs.package_name }}" \
            "${{ steps.version.outputs.package_name }}.tar.gz" \
            "${{ steps.version.outputs.package_name }}.tar.gz.sha256"
