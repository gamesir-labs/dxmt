name: Notify Feishu on GitHub Events

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
    types: [opened, closed, reopened, edited, synchronize]
  issues:
    types: [opened, closed, reopened]

permissions:
  contents: read
  issues: write

env:
  FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

jobs:
  notify:
    # Org Windows self-hosted runner (no GitHub-hosted minutes).
    runs-on: [self-hosted, Windows, X64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          sparse-checkout: |
            .github/scripts/ci-feishu.ps1
          sparse-checkout-cone-mode: false

      - name: Send notification to Feishu
        shell: powershell -ExecutionPolicy Bypass -NoProfile -Command ". '{0}'"
        run: |
          . .\.github\scripts\ci-feishu.ps1

          if ([string]::IsNullOrWhiteSpace($env:FEISHU_WEBHOOK_URL)) {
            Write-Host 'FEISHU_WEBHOOK_URL is not configured; skipping notification.'
            exit 0
          }

          $eventName = $env:GITHUB_EVENT_NAME
          $repoFull = $env:GITHUB_REPOSITORY
          $repoName = ($repoFull -split '/')[-1]
          $repoUrl = "https://github.com/$repoFull"
          $refName = $env:GITHUB_REF_NAME
          $actor = $env:GITHUB_ACTOR
          # Event payload is UTF-8 JSON from GitHub.
          $event = Get-Content -Raw -Encoding UTF8 -Path $env:GITHUB_EVENT_PATH | ConvertFrom-Json

          $messageTitle = 'Other Event'
          $messageSubTitle = "$repoName | $refName"
          $message = "Event $eventName triggered"
          $messageTheme = 'blue'
          $actionText = 'Open repository'
          $actionUrl = $repoUrl

          switch ($eventName) {
            'push' {
              # StrictMode throws on missing NoteProperties; read via helper.
              $commits = @(Get-NotePropertyValue $event 'commits' @())
              $sizeValue = Get-NotePropertyValue $event 'size'
              $commitCount = if ($null -ne $sizeValue) { [int]$sizeValue } else { $commits.Count }
              $messageTitle = if ($commitCount -eq 1) { '1 commit pushed' } else { "$commitCount commits pushed" }
              $messageSubTitle = "$repoName | $refName | pushed by $actor"
              $messageTheme = 'blue'
              $actionText = 'View changes'
              $compareUrl = Get-NotePropertyValue $event 'compare'
              if (-not [string]::IsNullOrWhiteSpace([string]$compareUrl)) {
                $actionUrl = [string]$compareUrl
              }

              $lines = New-Object System.Collections.Generic.List[string]
              foreach ($commit in $commits) {
                $id = [string](Get-NotePropertyValue $commit 'id' '')
                $sha = $id.Substring(0, [Math]::Min(7, $id.Length))
                $rawMessage = [string](Get-NotePropertyValue $commit 'message' '')
                $subject = ($rawMessage -split "`n")[0] -replace "[\r\t]", ' '
                if ($subject.Length -gt 180) { $subject = $subject.Substring(0, 177) + '...' }
                $authorObj = Get-NotePropertyValue $commit 'author'
                $authorName = Get-NotePropertyValue $authorObj 'name'
                $author = if ($authorName) { [string]$authorName } else { 'Unknown author' }
                $author = $author -replace "[\r\n\t]", ' '
                $lines.Add("[$sha](https://github.com/$repoFull/commit/$id)  $subject - $author") | Out-Null
              }
              if ($lines.Count -eq 0) {
                $message = 'No commits in push payload.'
              } else {
                $message = ($lines -join "`n")
              }
            }
            'pull_request' {
              $action = [string]$event.action
              $number = [string]$event.pull_request.number
              $title = [string]$event.pull_request.title
              $user = [string]$event.pull_request.user.login
              $headRef = [string]$event.pull_request.head.ref
              $baseRef = [string]$event.pull_request.base.ref
              $actionUrl = [string]$event.pull_request.html_url
              $messageTitle = "Pull request $action"
              $messageSubTitle = "$repoName | $headRef -> $baseRef"
              $message = "[#$number]($actionUrl)  $title`n`nOpened by $user"
              $messageTheme = 'turquoise'
              $actionText = 'View pull request'
            }
            'issues' {
              $action = [string]$event.action
              $number = [string]$event.issue.number
              $title = [string]$event.issue.title
              $user = [string]$event.issue.user.login
              $actionUrl = [string]$event.issue.html_url
              $messageTitle = "Issue $action"
              $messageSubTitle = "$repoName | #$number | $user"
              $message = "[#$number]($actionUrl)  $title"
              $messageTheme = 'orange'
              $actionText = 'View issue'
            }
          }

          if ([string]::IsNullOrWhiteSpace($actionUrl)) { $actionUrl = $repoUrl }

          Send-FeishuCard `
            -WebhookUrl $env:FEISHU_WEBHOOK_URL `
            -Title $messageTitle `
            -Subtitle $messageSubTitle `
            -Template $messageTheme `
            -Markdown $message `
            -ActionText $actionText `
            -ActionUrl $actionUrl
