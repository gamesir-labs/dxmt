name: Notify Feishu on GitHub Events

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]
    types: [ opened, closed, reopened, edited, synchronize ]
  issues:
    types: [ opened, closed, reopened ]

permissions:
  contents: read
  issues: write

env:
  FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send notification to Feishu
        run: |
          if [ -z "$FEISHU_WEBHOOK_URL" ]; then
            echo "FEISHU_WEBHOOK_URL is not configured; skipping notification."
            exit 0
          fi

          EVENT_NAME="$GITHUB_EVENT_NAME"
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          REPO_URL="https://github.com/$GITHUB_REPOSITORY"

          case "$EVENT_NAME" in
            push)
              commitCount=$(jq -r '.size // (.commits | length)' "$GITHUB_EVENT_PATH")
              messageTitle="$commitCount commits pushed"
              [ "$commitCount" = "1" ] && messageTitle="1 commit pushed"
              messageSubTitle="$REPO_NAME Â· $GITHUB_REF_NAME Â· pushed by $GITHUB_ACTOR"
              messageTheme="blue"
              actionText="View changes"
              actionUrl=$(jq -r '.compare // empty' "$GITHUB_EVENT_PATH")

              commitSummary=$(jq -c --arg repo "$GITHUB_REPOSITORY" '
                def display_units:
                  explode | map(if . > 127 then 2 else 1 end) | add // 0;
                def subject:
                  (.message // "Untitled commit")
                  | split("\n")[0]
                  | gsub("[\r\t]"; " ")
                  | if length > 180 then .[0:177] + "..." else . end;
                def author:
                  (.author.name // "Unknown author") | gsub("[\r\n\t]"; " ");
                def line:
                  "[" + (.id[0:7]) + "](https://github.com/" + $repo + "/commit/" + .id + ")  "
                  + subject + " Â· " + author;

                reduce .commits[] as $commit (
                  { text: "", shown: 0, full: false };
                  if .full then .
                  else
                    ($commit | line) as $line
                    | (if .text == "" then $line else .text + "\n" + $line end) as $next
                    | if (($next | display_units) <= 3600 and ($next | utf8bytelength) <= 18000)
                      then { text: $next, shown: (.shown + 1), full: false }
                      else .full = true
                      end
                  end
                )
                | {
                    text: (if .text == "" then "No commits in push payload." else .text end),
                    shown
                  }
              ' "$GITHUB_EVENT_PATH")
              message=$(printf '%s' "$commitSummary" | jq -r '.text')
              shownCount=$(printf '%s' "$commitSummary" | jq -r '.shown')

              if [ "$commitCount" -gt "$shownCount" ]; then
                message=$(printf '%s\n\n+%d more commits' \
                  "$message" "$((commitCount - shownCount))")
              fi
              ;;

            pull_request)
              action=$(jq -r '.action' "$GITHUB_EVENT_PATH")
              number=$(jq -r '.pull_request.number' "$GITHUB_EVENT_PATH")
              title=$(jq -r '.pull_request.title' "$GITHUB_EVENT_PATH")
              user=$(jq -r '.pull_request.user.login' "$GITHUB_EVENT_PATH")
              headRef=$(jq -r '.pull_request.head.ref' "$GITHUB_EVENT_PATH")
              baseRef=$(jq -r '.pull_request.base.ref' "$GITHUB_EVENT_PATH")
              actionUrl=$(jq -r '.pull_request.html_url' "$GITHUB_EVENT_PATH")

              messageTitle="Pull request $action"
              messageSubTitle="$REPO_NAME Â· $headRef â†’ $baseRef"
              message=$(printf '[#%s](%s)  %s\n\nOpened by %s' \
                "$number" "$actionUrl" "$title" "$user")
              messageTheme="turquoise"
              actionText="View pull request"
              ;;

            issues)
              action=$(jq -r '.action' "$GITHUB_EVENT_PATH")
              number=$(jq -r '.issue.number' "$GITHUB_EVENT_PATH")
              title=$(jq -r '.issue.title' "$GITHUB_EVENT_PATH")
              user=$(jq -r '.issue.user.login' "$GITHUB_EVENT_PATH")
              actionUrl=$(jq -r '.issue.html_url' "$GITHUB_EVENT_PATH")

              messageTitle="Issue $action"
              messageSubTitle="$REPO_NAME Â· #$number Â· $user"
              message="[#$number]($actionUrl)  $title"
              messageTheme="orange"
              actionText="View issue"
              ;;

            *)
              messageTitle="Other Event"
              messageSubTitle="$REPO_NAME Â· $GITHUB_REF_NAME"
              message="Event $EVENT_NAME triggered"
              messageTheme="grey"
              actionText="Open repository"
              actionUrl="$REPO_URL"
              ;;
          esac

          [ -n "$actionUrl" ] || actionUrl="$REPO_URL"

          PAYLOAD=$(jq -n \
            --arg mt "$messageTitle" \
            --arg ms "$messageSubTitle" \
            --arg mc "$message" \
            --arg theme "$messageTheme" \
            --arg action_text "$actionText" \
            --arg action_url "$actionUrl" \
            '{
              msg_type: "interactive",
              card: {
                schema: "2.0",
                config: { update_multi: true },
                header: {
                  title: { tag: "plain_text", content: $mt },
                  subtitle: { tag: "plain_text", content: $ms },
                  template: $theme
                },
                body: {
                  direction: "vertical",
                  padding: "12px 12px 12px 12px",
                  elements: [
                    {
                      tag: "markdown",
                      content: $mc
                    },
                    {
                      tag: "hr"
                    },
                    {
                      tag: "button",
                      text: { tag: "plain_text", content: $action_text },
                      type: "primary",
                      width: "default",
                      size: "medium",
                      behaviors: [
                        { type: "open_url", default_url: $action_url }
                      ]
                    }
                  ]
                }
              }
            }'
          )

          curl --fail-with-body --silent --show-error "$FEISHU_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
