name: CI Build

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: read
  attestations: write
  id-token: write

env:
  DXMT_CI_ROOT: /opt/dxmt-ci
  LLVM_VERSION: llvmorg-15.0.7
  WINE_VERSION: proton-11.0-macos
  WINE_GIT_URL: https://github.com/gamesir123/wine-proton-macos.git
  WINE_GIT_BRANCH: proton-11.0-macos
  WINE_ARM64EC_VERSION: wine-11.2
  WINE_ARM64EC_URL: https://github.com/3Shain/wine/releases/download/wine-11.2/wine-11.2.tar.gz
  LLVM_MINGW_VERSION: "20251216"
  LLVM_MINGW_DIR: llvm-mingw-20251216-ucrt-macos-universal
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  setup-host:
    runs-on: self-macos-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Probe and Prepare Host
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh setup-host

  setup-wine:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Wine
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
          WINE_ACCESS_TOKEN: ${{ secrets.WINE_ACCESS_TOKEN }}
        run: scripts/ci-self-hosted.sh ensure-wine x86_64

  setup-wine-arm64ec:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Wine ARM64EC
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh ensure-wine arm64ec

  setup-llvm-mingw:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare LLVM-MinGW
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh ensure-llvm-mingw

  setup-llvm-project:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare LLVM Source
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh ensure-llvm-project

  setup-llvm-darwin:
    runs-on: self-macos-runner
    needs: setup-llvm-project
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare LLVM Darwin x86_64
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh ensure-llvm-darwin x86_64

  setup-llvm-win:
    runs-on: self-macos-runner
    needs: [setup-llvm-project, setup-llvm-mingw]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare LLVM Windows
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh ensure-llvm-win

  setup-llvm-darwin-arm64:
    runs-on: self-macos-runner
    needs: setup-llvm-project
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare LLVM Darwin arm64
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh ensure-llvm-darwin arm64

  build-gcc-release-x86_64-windows-cross:
    runs-on: self-macos-runner
    needs: [setup-wine, setup-llvm-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build
        run: |
          scripts/ci-self-hosted.sh prepare-job
          scripts/ci-self-hosted.sh link-toolchains x86_64
          meson setup --cross-file build-win64.txt -Denable_nvapi=true -Denable_nvngx=true -Dnative_llvm_path=toolchains/llvm-darwin -Dwine_build_path= -Dwine_install_path=toolchains/wine build --buildtype release --prefix "$(pwd)/install" --strip
          meson compile -C build
          meson install -C build
          scripts/ci-self-hosted.sh stage-artifact gcc-release-x86_64-windows-cross install

  build-gcc-release-x86-windows-cross:
    runs-on: self-macos-runner
    needs: [setup-wine]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build WoW64
        run: |
          scripts/ci-self-hosted.sh prepare-job
          scripts/ci-self-hosted.sh link-toolchains x86_64
          meson setup --cross-file build-win32.txt -Dwine_build_path= -Dwine_install_path=toolchains/wine build --buildtype release --prefix "$(pwd)/install" --strip
          meson compile -C build
          meson install -C build
          scripts/ci-self-hosted.sh stage-artifact gcc-release-x86-windows-cross install

  build-clang-debugoptimized-x86_64-windows-cross:
    runs-on: self-macos-runner
    needs: [setup-wine, setup-llvm-mingw, setup-llvm-darwin, setup-llvm-win]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build
        run: |
          scripts/ci-self-hosted.sh prepare-job
          scripts/ci-self-hosted.sh link-toolchains x86_64
          meson setup --cross-file build-win64.txt -Dnative_llvm_path=toolchains/llvm-darwin -Dwine_build_path= -Dwine_install_path=toolchains/wine -Dbuild_airconv_for_windows=true -Denable_nvapi=true -Denable_nvngx=true build --buildtype debugoptimized --prefix "$(pwd)/install"
          meson compile -C build
          meson install -C build
          scripts/ci-self-hosted.sh stage-artifact clang-debugoptimized-x86_64-windows-cross install

  build-clang-release-x86_64-windows-cross:
    runs-on: self-macos-runner
    needs: [setup-wine, setup-llvm-mingw, setup-llvm-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build
        run: |
          scripts/ci-self-hosted.sh prepare-job
          scripts/ci-self-hosted.sh link-toolchains x86_64
          meson setup --cross-file build-win64.txt -Denable_nvapi=true -Denable_nvngx=true -Dnative_llvm_path=toolchains/llvm-darwin -Dwine_build_path= -Dwine_install_path=toolchains/wine build --buildtype release --prefix "$(pwd)/install" --strip
          meson compile -C build
          meson install -C build
          scripts/ci-self-hosted.sh stage-artifact clang-release-x86_64-windows-cross install

  build-clang-release-x86-windows-cross:
    runs-on: self-macos-runner
    needs: [setup-wine, setup-llvm-mingw]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build WoW64
        run: |
          scripts/ci-self-hosted.sh prepare-job
          scripts/ci-self-hosted.sh link-toolchains x86_64
          meson setup --cross-file build-win32.txt -Dwine_build_path= -Dwine_install_path=toolchains/wine build --buildtype release --prefix "$(pwd)/install" --strip
          meson compile -C build
          meson install -C build
          scripts/ci-self-hosted.sh stage-artifact clang-release-x86-windows-cross install

  build-clang-debugoptimized-arm64ec-windows-cross:
    runs-on: self-macos-runner
    needs: [setup-wine-arm64ec, setup-llvm-mingw, setup-llvm-darwin-arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build
        run: |
          scripts/ci-self-hosted.sh prepare-job
          scripts/ci-self-hosted.sh link-toolchains arm64ec
          meson setup --cross-file build-arm64ec.txt -Dnative_llvm_path=toolchains/llvm-darwin-arm64 -Dwine_build_path= -Dwine_install_path=toolchains/wine build --buildtype debugoptimized --prefix "$(pwd)/install"
          meson compile -C build
          meson install -C build
          scripts/ci-self-hosted.sh stage-artifact clang-debugoptimized-arm64ec-windows-cross install

  build-clang-release-arm64-macos:
    runs-on: self-macos-runner
    needs: setup-llvm-darwin-arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build
        run: |
          scripts/ci-self-hosted.sh prepare-job
          scripts/ci-self-hosted.sh link-toolchains x86_64
          meson setup -Dnative_llvm_path=toolchains/llvm-darwin-arm64 build --buildtype release --prefix "$(pwd)/install" --strip
          meson compile -C build
          meson install -C build
          scripts/ci-self-hosted.sh stage-artifact clang-release-arm64-macos install

  package:
    runs-on: self-macos-runner
    needs: [build-gcc-release-x86_64-windows-cross, build-gcc-release-x86-windows-cross]
    env:
      PACKAGE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Create Tarball
        run: |
          scripts/ci-self-hosted.sh copy-artifact gcc-release-x86_64-windows-cross "./combined/${PACKAGE_TAG}"
          scripts/ci-self-hosted.sh copy-artifact gcc-release-x86-windows-cross "./combined/${PACKAGE_TAG}"
          tar -czf "dxmt-${PACKAGE_TAG}.tar.gz" -C ./combined --exclude='*.a' "${PACKAGE_TAG}"

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          subject-path: dxmt-${{ env.PACKAGE_TAG }}.tar.gz

      - name: Stage Combined Artifact
        run: scripts/ci-self-hosted.sh stage-files "dxmt-${PACKAGE_TAG}" "dxmt-${PACKAGE_TAG}.tar.gz"
