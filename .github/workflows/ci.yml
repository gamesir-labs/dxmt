name: CI Build

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  pull-requests: read
  attestations: write
  id-token: write

env:
  LLVM_VERSION: llvmorg-15.0.7
  WINE_VERSION: proton-11.0-macos
  WINE_GIT_URL: https://github.com/gamesir123/wine-proton-macos.git
  WINE_GIT_BRANCH: proton-11.0-macos
  LLVM_MINGW_VERSION: "20251216"
  LLVM_MINGW_DIR: llvm-mingw-20251216-ucrt-macos-universal
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  setup-host:
    runs-on: self-macos-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Probe and Prepare Host
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          scripts/ci-self-hosted.sh setup-host
          scripts/dxmt-builder --help

  setup-wine:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Prepare Wine
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
          WINE_ACCESS_TOKEN: ${{ secrets.WINE_ACCESS_TOKEN }}
        run: |
          case "${WINE_ACCESS_TOKEN}" in
            ghp_*) echo "Wine token kind: classic" ;;
            github_pat_*) echo "Wine token kind: fine-grained" ;;
            "") echo "::error::WINE_ACCESS_TOKEN is empty"; exit 1 ;;
            *) echo "Wine token kind: unknown" ;;
          esac
          scripts/dxmt-builder bootstrap wine-x64

  setup-llvm-mingw:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Prepare LLVM-MinGW
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/dxmt-builder bootstrap llvm-mingw

  setup-llvm-project:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Prepare LLVM Source
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/dxmt-builder bootstrap llvm-project

  setup-llvm-darwin:
    runs-on: self-macos-runner
    needs: setup-llvm-project
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Prepare LLVM Darwin x86_64
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/dxmt-builder bootstrap llvm-darwin-x64

  setup-llvm-win:
    runs-on: self-macos-runner
    needs: [setup-llvm-project, setup-llvm-mingw]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Prepare LLVM Windows
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/dxmt-builder bootstrap llvm-win

  build-gcc-release-x86_64-windows-cross:
    runs-on: self-macos-runner
    needs: [setup-wine, setup-llvm-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          submodules: true

      - name: Build
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          profile=gcc-x64-release-full
          install_dir=.cache/managed/profiles/${profile}/install
          rm -rf "${install_dir}"
          scripts/ci-self-hosted.sh prepare-job
          scripts/dxmt-builder build --profile "${profile}" runtime tests-all benchmarks
          scripts/dxmt-builder test --profile "${profile}" all
          DXMT_BUILDER_REQUIRE_TESTED=1 scripts/dxmt-builder install \
            --profile "${profile}" --component runtime
          scripts/ci-self-hosted.sh stage-artifact gcc-release-x86_64-windows-cross "${install_dir}/usr/local"

  build-gcc-release-x86-windows-cross:
    runs-on: self-macos-runner
    needs: [setup-wine]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          submodules: true

      - name: Build WoW64
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          profile=gcc-x86-release
          install_dir=.cache/managed/profiles/${profile}/install
          rm -rf "${install_dir}"
          scripts/ci-self-hosted.sh prepare-job
          scripts/dxmt-builder build --profile "${profile}" runtime
          scripts/dxmt-builder install --profile "${profile}" --component runtime
          scripts/ci-self-hosted.sh stage-artifact gcc-release-x86-windows-cross "${install_dir}/usr/local"

  build-clang-debugoptimized-x86_64-windows-cross:
    runs-on: self-macos-runner
    needs: [setup-wine, setup-llvm-mingw, setup-llvm-darwin, setup-llvm-win]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          submodules: true

      - name: Build
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          profile=llvm-mingw-x64-debugoptimized
          install_dir=.cache/managed/profiles/${profile}/install
          rm -rf "${install_dir}"
          scripts/ci-self-hosted.sh prepare-job
          scripts/dxmt-builder build --profile "${profile}" runtime
          scripts/dxmt-builder install --profile "${profile}" --component runtime
          scripts/ci-self-hosted.sh stage-artifact clang-debugoptimized-x86_64-windows-cross "${install_dir}/usr/local"

  build-clang-release-x86_64-windows-cross:
    runs-on: self-macos-runner
    needs: [setup-wine, setup-llvm-mingw, setup-llvm-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          submodules: true

      - name: Build
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          profile=llvm-mingw-x64-release
          install_dir=.cache/managed/profiles/${profile}/install
          rm -rf "${install_dir}"
          scripts/ci-self-hosted.sh prepare-job
          scripts/dxmt-builder build --profile "${profile}" runtime
          scripts/dxmt-builder install --profile "${profile}" --component runtime
          scripts/ci-self-hosted.sh stage-artifact clang-release-x86_64-windows-cross "${install_dir}/usr/local"

  build-clang-release-x86-windows-cross:
    runs-on: self-macos-runner
    needs: [setup-wine, setup-llvm-mingw]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          submodules: true

      - name: Build WoW64
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          profile=llvm-mingw-x86-release
          install_dir=.cache/managed/profiles/${profile}/install
          rm -rf "${install_dir}"
          scripts/ci-self-hosted.sh prepare-job
          scripts/dxmt-builder build --profile "${profile}" runtime
          scripts/dxmt-builder install --profile "${profile}" --component runtime
          scripts/ci-self-hosted.sh stage-artifact clang-release-x86-windows-cross "${install_dir}/usr/local"

  build-clang-release-x86_64-macos:
    runs-on: self-macos-runner
    needs: setup-llvm-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          submodules: true

      - name: Build
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          profile=apple-clang-x86_64-release
          scripts/ci-self-hosted.sh prepare-job
          scripts/dxmt-builder build --profile "${profile}" runtime

  package:
    runs-on: self-macos-runner
    needs: [build-gcc-release-x86_64-windows-cross, build-gcc-release-x86-windows-cross]
    env:
      PACKAGE_TAG: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Create Tarball
        run: |
          rm -rf ".cache/package/combined/${PACKAGE_TAG}"
          scripts/ci-self-hosted.sh copy-artifact gcc-release-x86_64-windows-cross ".cache/package/combined/${PACKAGE_TAG}"
          scripts/ci-self-hosted.sh copy-artifact gcc-release-x86-windows-cross ".cache/package/combined/${PACKAGE_TAG}"
          tar -czf "dxmt-${PACKAGE_TAG}.tar.gz" -C .cache/package/combined --exclude='*.a' "${PACKAGE_TAG}"

      - name: Generate Artifact Attestation
        uses: actions/attest-build-provenance@v1
        if: startsWith(github.ref, 'refs/tags/v')
        with:
          subject-path: dxmt-${{ env.PACKAGE_TAG }}.tar.gz

      - name: Stage Combined Artifact
        run: scripts/ci-self-hosted.sh stage-files "dxmt-${PACKAGE_TAG}" "dxmt-${PACKAGE_TAG}.tar.gz"
