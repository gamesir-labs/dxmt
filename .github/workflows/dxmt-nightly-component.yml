name: DXMT Nightly Component

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: Branch, tag, or SHA to build
        required: true
        default: main
        type: string
      api_environment:
        description: Backend API environment to upload to
        required: true
        default: dev
        type: choice
        options:
          - dev
          - main
          - dev+main

permissions:
  contents: read

concurrency:
  group: dxmt-nightly-component-${{ github.ref }}-${{ inputs.source_ref }}-${{ inputs.api_environment }}
  cancel-in-progress: true

env:
  LLVM_VERSION: llvmorg-15.0.7
  WINE_VERSION: proton-11.0-macos
  WINE_GIT_URL: https://github.com/gamesir123/wine-proton-macos.git
  WINE_GIT_BRANCH: proton-11.0-macos
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  resolve-source:
    runs-on: self-macos-runner
    outputs:
      source_sha: ${{ steps.source.outputs.source_sha }}
      source_short_sha: ${{ steps.source.outputs.source_short_sha }}
      package_name: ${{ steps.source.outputs.package_name }}
      artifact_name: ${{ steps.source.outputs.artifact_name }}
      package_file: ${{ steps.source.outputs.package_file }}
      package_root_name: ${{ steps.source.outputs.package_root_name }}
      reusable_local_artifact: ${{ steps.local-artifact.outputs.found }}
      upload_matrix: ${{ steps.upload-targets.outputs.upload_matrix }}
      upload_target_names: ${{ steps.upload-targets.outputs.upload_target_names }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout Source Ref
        uses: actions/checkout@v6
        with:
          clean: false
          ref: ${{ inputs.source_ref }}

      - name: Resolve Source Ref
        id: source
        run: |
          source_sha="$(git rev-parse HEAD)"
          source_short_sha="$(git rev-parse --short=7 HEAD)"
          component_name="dxmt-nightly"
          package_name="${component_name}-${source_short_sha}"
          artifact_name="${component_name}-component-${source_short_sha}"
          package_file="dist/${package_name}.tzst"
          {
            echo "source_sha=${source_sha}"
            echo "source_short_sha=${source_short_sha}"
            echo "package_name=${package_name}"
            echo "artifact_name=${artifact_name}"
            echo "package_file=${package_file}"
            echo "package_root_name=${component_name}"
          } >> "$GITHUB_OUTPUT"
          echo "Workflow ref: ${GITHUB_REF}"
          echo "Source ref: ${{ inputs.source_ref }}"
          echo "Source commit: ${source_sha}"
          echo "Source short SHA: ${source_short_sha}"
          echo "Component artifact name: ${artifact_name}"

      - name: Find Local Nightly Artifact
        id: local-artifact
        run: |
          artifact_name="${{ steps.source.outputs.artifact_name }}"
          package_file="${{ steps.source.outputs.package_file }}"
          probe_dir="$(mktemp -d "${TMPDIR:-/tmp}/dxmt-local-artifact.XXXXXX")"
          if scripts/ci-self-hosted.sh restore-staged-files "${artifact_name}" "${probe_dir}" \
              "${package_file}" "${package_file}.sha256" "${package_file}.builder-metadata" && \
              (cd "${probe_dir}" && shasum -a 256 -c "$(basename "${package_file}").sha256") && \
              grep -qx "commit=${{ steps.source.outputs.source_sha }}" \
                "${probe_dir}/$(basename "${package_file}").builder-metadata" && \
              grep -qx 'profile=gcc-x64-release-full' \
                "${probe_dir}/$(basename "${package_file}").builder-metadata" && \
              grep -qx 'tests_passed=true' \
                "${probe_dir}/$(basename "${package_file}").builder-metadata"; then
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "Found validated local nightly artifact: ${artifact_name}"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "No local nightly artifact found for ${artifact_name}; building in this workflow"
          fi
          rm -rf "${probe_dir}"

      - name: Resolve Upload Targets
        id: upload-targets
        run: |
          api_environment="${{ inputs.api_environment }}"

          case "${api_environment}" in
            dev)
              upload_matrix='{"include":[{"target":"dev"}]}'
              upload_target_names="dev"
              ;;
            main)
              upload_matrix='{"include":[{"target":"main"}]}'
              upload_target_names="main"
              ;;
            dev+main)
              upload_matrix='{"include":[{"target":"dev"},{"target":"main"}]}'
              upload_target_names="dev main"
              ;;
            *)
              echo "::error::unsupported api_environment: ${api_environment}"
              exit 1
              ;;
          esac

          {
            echo "upload_matrix=${upload_matrix}"
            echo "upload_target_names=${upload_target_names}"
          } >> "$GITHUB_OUTPUT"

          echo "Requested backend API environment: ${api_environment}"
          echo "Backend upload target(s): ${upload_target_names}"

  setup-host:
    runs-on: self-macos-runner
    needs: resolve-source
    if: ${{ needs.resolve-source.outputs.reusable_local_artifact != 'true' }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          ref: ${{ needs.resolve-source.outputs.source_sha }}

      - name: Probe and Prepare Host
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          scripts/ci-self-hosted.sh setup-host
          scripts/dxmt-builder --help

  setup-wine:
    runs-on: self-macos-runner
    needs: [resolve-source, setup-host]
    if: ${{ needs.resolve-source.outputs.reusable_local_artifact != 'true' }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          ref: ${{ needs.resolve-source.outputs.source_sha }}

      - name: Prepare Wine
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
          WINE_ACCESS_TOKEN: ${{ secrets.WINE_ACCESS_TOKEN }}
        run: |
          case "${WINE_ACCESS_TOKEN}" in
            ghp_*) echo "Wine token kind: classic" ;;
            github_pat_*) echo "Wine token kind: fine-grained" ;;
            "") echo "::error::WINE_ACCESS_TOKEN is empty"; exit 1 ;;
            *) echo "Wine token kind: unknown" ;;
          esac
          scripts/dxmt-builder bootstrap wine-x64

  setup-llvm-project:
    runs-on: self-macos-runner
    needs: [resolve-source, setup-host]
    if: ${{ needs.resolve-source.outputs.reusable_local_artifact != 'true' }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          ref: ${{ needs.resolve-source.outputs.source_sha }}

      - name: Prepare LLVM Source
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/dxmt-builder bootstrap llvm-project

  setup-llvm-darwin:
    runs-on: self-macos-runner
    needs: [resolve-source, setup-llvm-project]
    if: ${{ needs.resolve-source.outputs.reusable_local_artifact != 'true' }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          ref: ${{ needs.resolve-source.outputs.source_sha }}

      - name: Prepare LLVM Darwin x86_64
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/dxmt-builder bootstrap llvm-darwin-x64

  build-x86_64-windows:
    runs-on: self-macos-runner
    needs: [resolve-source, setup-wine, setup-llvm-darwin]
    if: ${{ needs.resolve-source.outputs.reusable_local_artifact != 'true' }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          ref: ${{ needs.resolve-source.outputs.source_sha }}

      - name: Checkout Build Submodules
        run: git submodule update --init --depth=1 external/apitrace external/nvapi include/native/directx

      - name: Build x86_64 Wine Builtin Runtime
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          profile=gcc-x64-release-full
          install_dir=.cache/managed/profiles/${profile}/install
          rm -rf "${install_dir}"
          short_sha="$(git rev-parse --short=7 HEAD)"
          scripts/ci-self-hosted.sh prepare-job
          DXMT_BUILDER_DXMT_VERSION="${short_sha}" scripts/dxmt-builder build \
            --profile "${profile}" runtime tests-all benchmarks
          DXMT_BUILDER_DXMT_VERSION="${short_sha}" scripts/dxmt-builder test \
            --profile "${profile}" all
          DXMT_BUILDER_DXMT_VERSION="${short_sha}" DXMT_BUILDER_REQUIRE_TESTED=1 \
            scripts/dxmt-builder install --profile "${profile}" \
              --component runtime
          find "${install_dir}/usr/local" -name '*.a' -delete
          scripts/ci-self-hosted.sh stage-artifact component-x86_64-runtime "${install_dir}/usr/local"

  build-x86-windows:
    runs-on: self-macos-runner
    # Native LLVM is required by dxmt-builder for both x86 and x86_64 profiles.
    needs: [resolve-source, setup-wine, setup-llvm-darwin]
    if: ${{ needs.resolve-source.outputs.reusable_local_artifact != 'true' }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          ref: ${{ needs.resolve-source.outputs.source_sha }}

      - name: Checkout Build Submodules
        run: git submodule update --init --depth=1 external/apitrace external/nvapi include/native/directx

      - name: Build x86 Wine Builtin Runtime
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: |
          profile=gcc-x86-release
          install_dir=.cache/managed/profiles/${profile}/install
          rm -rf "${install_dir}"
          short_sha="$(git rev-parse --short=7 HEAD)"
          scripts/ci-self-hosted.sh prepare-job
          DXMT_BUILDER_DXMT_VERSION="${short_sha}" scripts/dxmt-builder build \
            --profile "${profile}" runtime
          DXMT_BUILDER_DXMT_VERSION="${short_sha}" scripts/dxmt-builder install \
            --profile "${profile}" --component runtime
          find "${install_dir}/usr/local" -name '*.a' -delete
          scripts/ci-self-hosted.sh stage-artifact component-x86-runtime "${install_dir}/usr/local"

  package:
    runs-on: self-macos-runner
    needs: [resolve-source, build-x86_64-windows, build-x86-windows]
    if: ${{ always() && needs.resolve-source.result == 'success' && (needs.resolve-source.outputs.reusable_local_artifact == 'true' || (needs.build-x86_64-windows.result == 'success' && needs.build-x86-windows.result == 'success')) }}
    outputs:
      package_name: ${{ steps.package.outputs.package_name }}
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      package_file: ${{ steps.package.outputs.package_file }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false
          ref: ${{ needs.resolve-source.outputs.source_sha }}

      - name: Set Package Outputs
        id: package
        run: |
          {
            echo "short_sha=${{ needs.resolve-source.outputs.source_short_sha }}"
            echo "package_name=${{ needs.resolve-source.outputs.package_name }}"
            echo "artifact_name=${{ needs.resolve-source.outputs.artifact_name }}"
            echo "package_root_name=${{ needs.resolve-source.outputs.package_root_name }}"
            echo "package_file=${{ needs.resolve-source.outputs.package_file }}"
          } >> "$GITHUB_OUTPUT"

      - name: Restore Local Nightly Artifact
        if: ${{ needs.resolve-source.outputs.reusable_local_artifact == 'true' }}
        run: |
          scripts/ci-self-hosted.sh restore-staged-files "${{ needs.resolve-source.outputs.artifact_name }}" dist \
            "${{ needs.resolve-source.outputs.package_file }}" \
            "${{ needs.resolve-source.outputs.package_file }}.sha256" \
            "${{ needs.resolve-source.outputs.package_file }}.builder-metadata"

      - name: Assemble Component Package
        if: ${{ needs.resolve-source.outputs.reusable_local_artifact != 'true' }}
        run: |
          short_sha="${{ steps.package.outputs.short_sha }}"
          package_name="${{ steps.package.outputs.package_name }}"
          package_root_name="${{ steps.package.outputs.package_root_name }}"
          package_root=".cache/package/combined/${package_root_name}"
          rm -rf .cache/package/combined ./dist
          mkdir -p "${package_root}/wine" ./dist

          scripts/ci-self-hosted.sh copy-artifact component-x86_64-runtime "${package_root}/wine"
          scripts/ci-self-hosted.sh copy-artifact component-x86-runtime "${package_root}/wine"
          find "${package_root}" -name '*.a' -delete

          python3 - "${package_root}/manifest.json" "${package_root_name}" "${package_name}" "${short_sha}" <<'PY'
          import json
          import sys

          manifest_path, component_id, package_name, version = sys.argv[1:]
          manifest = {
              "id": component_id,
              "name": package_name,
              "version": version,
              "link_unix_libs": [
                  "${COMPONENT_PATH}/wine/x86_64-unix",
              ],
              "link_windows_dlls": [
                  "${COMPONENT_PATH}/wine/i386-windows",
                  "${COMPONENT_PATH}/wine/x86_64-windows",
              ],
              "environment_template": {
                  "WINEDLLPATH": "${COMPONENT_PATH}/wine",
              },
          }
          with open(manifest_path, "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PY

      - name: Verify Component Package Layout
        if: ${{ needs.resolve-source.outputs.reusable_local_artifact != 'true' }}
        run: |
          short_sha="${{ steps.package.outputs.short_sha }}"
          package_name="${{ steps.package.outputs.package_name }}"
          package_root_name="${{ steps.package.outputs.package_root_name }}"
          package_root=".cache/package/combined/${package_root_name}"
          test ! -e ".cache/package/combined/${package_name}"
          test -f "${package_root}/manifest.json"
          test -d "${package_root}/wine/i386-windows"
          test -d "${package_root}/wine/x86_64-windows"
          test -d "${package_root}/wine/x86_64-unix"
          test -f "${package_root}/wine/i386-windows/dxgi.dll"
          test -f "${package_root}/wine/x86_64-windows/dxgi.dll"
          test -f "${package_root}/wine/x86_64-unix/winemetal.so"
          find "${package_root}" -maxdepth 1 -mindepth 1 \
            ! -name manifest.json \
            ! -name wine \
            -exec sh -c 'echo "unexpected package entry: $1" >&2; exit 1' sh {} \;
          python3 - "${package_root}/manifest.json" "${package_root_name}" "${package_name}" "${short_sha}" <<'PY'
          import json
          import sys

          manifest_path, component_id, package_name, version = sys.argv[1:]
          with open(manifest_path, "r", encoding="utf-8") as f:
              manifest = json.load(f)
          expected = {
              "id": component_id,
              "name": package_name,
              "version": version,
          }
          actual = {key: manifest.get(key) for key in expected}
          if actual != expected:
              raise SystemExit(f"unexpected manifest identity: {actual} != {expected}")
          PY

      - name: Create Component Archive
        if: ${{ needs.resolve-source.outputs.reusable_local_artifact != 'true' }}
        run: |
          if ! command -v zstd >/dev/null 2>&1; then
            brew install --formula zstd
          fi
          package_root_name="${{ steps.package.outputs.package_root_name }}"
          package_file="${{ steps.package.outputs.package_file }}"
          tar -cf - -C .cache/package/combined "${package_root_name}" | zstd -T0 -19 -o "${package_file}"
          case "${package_file}" in
            *.tzst) ;;
            *) echo "::error::component archive must end with .tzst"; exit 1 ;;
          esac
          zstd -t "${package_file}"
          shasum -a 256 "${package_file}" > "${package_file}.sha256"
          tests_metadata=.cache/managed/profiles/gcc-x64-release-full/meta/tests-passed.properties
          test -f "${tests_metadata}"
          cp "${tests_metadata}" "${package_file}.builder-metadata"

      - name: Verify Component Artifact
        run: |
          package_file="${{ steps.package.outputs.package_file }}"
          test -f "${package_file}" || { echo "::error::component archive is missing: ${package_file}"; exit 1; }
          test -f "${package_file}.sha256" || { echo "::error::component checksum is missing: ${package_file}.sha256"; exit 1; }
          test -f "${package_file}.builder-metadata" || { echo "::error::builder metadata is missing"; exit 1; }
          shasum -a 256 -c "${package_file}.sha256"

      - name: Upload GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: |
            ${{ steps.package.outputs.package_file }}
            ${{ steps.package.outputs.package_file }}.sha256
            ${{ steps.package.outputs.package_file }}.builder-metadata
          if-no-files-found: error
          retention-days: 14

      - name: Stage Local Component Artifact
        if: always()
        run: |
          if [[ -f "${{ steps.package.outputs.package_file }}" ]]; then
            scripts/ci-self-hosted.sh stage-files "${{ steps.package.outputs.artifact_name }}" \
              "${{ steps.package.outputs.package_file }}" \
              "${{ steps.package.outputs.package_file }}.sha256" \
              "${{ steps.package.outputs.package_file }}.builder-metadata"
          fi

  upload-backend-component:
    runs-on: self-macos-runner
    needs: [resolve-source, package]
    name: upload-${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.resolve-source.outputs.upload_matrix) }}
    environment:
      name: ${{ matrix.target }}
    env:
      BACKEND_UPDATE_TOKEN: ${{ secrets.BACKEND_UPDATE_TOKEN }}
      DEV_BACKEND_UPLOAD_TOKEN: ${{ secrets.DEV_BACKEND_UPLOAD_TOKEN }}
      PRO_BACKEND_UPLOAD_TOKEN: ${{ secrets.PRO_BACKEND_UPLOAD_TOKEN }}
      DEV_COMPONENT_UPLOAD_URL: ${{ secrets.DEV_COMPONENT_UPLOAD_URL }}
      DEV_COMPONENT_UPDATE_BASE_URL: ${{ secrets.DEV_COMPONENT_UPDATE_BASE_URL }}
      DEV_COMPONENT_ID: ${{ secrets.DEV_COMPONENT_ID }}
      PRO_COMPONENT_UPLOAD_URL: ${{ secrets.PRO_COMPONENT_UPLOAD_URL }}
      PRO_COMPONENT_UPDATE_BASE_URL: ${{ secrets.PRO_COMPONENT_UPDATE_BASE_URL }}
      PRO_COMPONENT_ID: ${{ secrets.PRO_COMPONENT_ID }}
    steps:
      - name: Download Component Artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.package.outputs.artifact_name }}
          path: dist

      - name: Verify Component Artifact
        run: |
          package_file="${{ needs.package.outputs.package_file }}"
          test -f "${package_file}" || { echo "::error::component archive is missing: ${package_file}"; exit 1; }
          test -f "${package_file}.sha256" || { echo "::error::component checksum is missing: ${package_file}.sha256"; exit 1; }
          shasum -a 256 -c "${package_file}.sha256"

      - name: Resolve Backend Upload Environment
        run: |
          api_environment="${{ matrix.target }}"

          case "${api_environment}" in
            dev)
              resolved_token="${DEV_BACKEND_UPLOAD_TOKEN}"
              token_secret_name="DEV_BACKEND_UPLOAD_TOKEN"
              component_upload_url="${DEV_COMPONENT_UPLOAD_URL}"
              component_update_base_url="${DEV_COMPONENT_UPDATE_BASE_URL}"
              component_id="${DEV_COMPONENT_ID}"
              ;;
            main)
              resolved_token="${BACKEND_UPDATE_TOKEN}"
              token_secret_name="BACKEND_UPDATE_TOKEN"
              if [[ -z "${resolved_token}" ]]; then
                echo "::warning::BACKEND_UPDATE_TOKEN is empty; falling back to PRO_BACKEND_UPLOAD_TOKEN"
                resolved_token="${PRO_BACKEND_UPLOAD_TOKEN}"
                token_secret_name="PRO_BACKEND_UPLOAD_TOKEN"
              fi
              component_upload_url="${PRO_COMPONENT_UPLOAD_URL}"
              component_update_base_url="${PRO_COMPONENT_UPDATE_BASE_URL}"
              component_id="${PRO_COMPONENT_ID}"
              ;;
            *)
              echo "::error::unsupported api_environment: ${api_environment}"
              exit 1
              ;;
          esac

          test -n "${resolved_token}" || { echo "::error::${token_secret_name} is empty"; exit 1; }
          test -n "${component_upload_url}" || { echo "::error::${api_environment} component upload URL is empty"; exit 1; }
          test -n "${component_update_base_url}" || { echo "::error::${api_environment} component update base URL is empty"; exit 1; }
          test -n "${component_id}" || { echo "::error::${api_environment} component id is empty"; exit 1; }

          echo "::add-mask::${resolved_token}"
          {
            echo "API_ENV=${api_environment}"
            echo "CIAUTH_TOKEN=${resolved_token}"
            echo "COMPONENT_UPLOAD_URL=${component_upload_url}"
            echo "COMPONENT_UPDATE_BASE_URL=${component_update_base_url}"
            echo "COMPONENT_ID=${component_id}"
          } >> "${GITHUB_ENV}"

          echo "Requested backend API environment: ${{ inputs.api_environment }}"
          echo "Resolved backend API environment: ${api_environment}"
          echo "Using token secret: ${token_secret_name}"
          echo "Component upload URL: ${component_upload_url}"
          echo "Component update URL: ${component_update_base_url%/}/${component_id}"

      - name: Upload And Update Backend Component
        run: |
          test -n "${CIAUTH_TOKEN}" || { echo "::error::CIAUTH_TOKEN is empty"; exit 1; }
          test -n "${COMPONENT_UPLOAD_URL}" || { echo "::error::COMPONENT_UPLOAD_URL is empty"; exit 1; }
          test -n "${COMPONENT_UPDATE_BASE_URL}" || { echo "::error::COMPONENT_UPDATE_BASE_URL is empty"; exit 1; }
          test -n "${COMPONENT_ID}" || { echo "::error::COMPONENT_ID is empty"; exit 1; }

          package_file="${{ needs.package.outputs.package_file }}"
          case "${package_file}" in
            *.tzst) ;;
            *) echo "::error::component archive must end with .tzst"; exit 1 ;;
          esac

          print_response_body() {
            local label="$1"
            local response_path="$2"
            if [[ -s "${response_path}" ]]; then
              echo "::group::${label} response body"
              cat "${response_path}"
              echo
              echo "::endgroup::"
            else
              echo "::warning::${label} response body is empty"
            fi
          }

          upload_status="$(curl -sS -X POST "${COMPONENT_UPLOAD_URL}" \
            -H "CIAuth-Token: ${CIAUTH_TOKEN}" \
            -F "file=@${package_file}" \
            -F "dir=emulator" \
            -o upload-response.json \
            -w '%{http_code}')" || {
            curl_exit="$?"
            echo "::error::upload request failed with curl exit ${curl_exit}"
            print_response_body "upload" upload-response.json
            exit "${curl_exit}"
          }

          case "${upload_status}" in
            2??) ;;
            *)
              echo "::error::upload request failed with HTTP ${upload_status}"
              print_response_body "upload" upload-response.json
              exit 1
              ;;
          esac

          python3 - upload-response.json component-update.json <<'PY'
          import json
          import sys

          upload_response_path, payload_path = sys.argv[1:]
          with open(upload_response_path, "r", encoding="utf-8") as f:
              response = json.load(f)

          if response.get("code") not in (0, 200):
              raise SystemExit(f"upload failed: {response}")

          data = response.get("data") or {}
          url = data.get("url")
          file_name = data.get("file_name")
          file_size = data.get("file_size")
          sha256 = data.get("sha256")

          if not url or not file_name or file_size is None or not sha256:
              raise SystemExit(f"upload response missing file metadata: {response}")
          if not str(file_name).endswith(".tzst"):
              raise SystemExit(f"uploaded file name must end with .tzst: {file_name}")

          payload = {
              "name": "dxmt-nightly",
              "display_name": "dxmt-nightly",
              "type": 3,
              "version": "1.0.0",
              "version_code": 9,
              "status": 1,
              "is_base": 0,
              "base_type": 0,
              "is_default": 0,
              "is_ui": 1,
              "weight": 0,
              "filter": {
                  "labels": {
                      "platform-MAC": "Mac端",
                  },
              },
              "blurb": "dxmt的nightly版本",
              "logo": "https://test-gamemac-cdn.mx520.com/uploads/emulator/20260424/b7486e45241b4b4282537c682b5d3ff3.png",
              "lang_param": {},
              "gpu_range": "",
              "download_url": url,
              "download_url_en": url,
              "file_name": file_name,
              "file_name_en": file_name,
              "file_size": str(file_size),
              "file_size_en": str(file_size),
              "file_sha256": sha256,
              "file_sha256_en": sha256,
          }

          with open(payload_path, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

          update_status="$(curl -sS -X PUT "${COMPONENT_UPDATE_BASE_URL%/}/${COMPONENT_ID}" \
            -H "CIAuth-Token: ${CIAUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @component-update.json \
            -o update-response.json \
            -w '%{http_code}')" || {
            curl_exit="$?"
            echo "::error::component update request failed with curl exit ${curl_exit}"
            print_response_body "component update" update-response.json
            exit "${curl_exit}"
          }

          case "${update_status}" in
            2??) ;;
            *)
              echo "::error::component update request failed with HTTP ${update_status}"
              print_response_body "component update" update-response.json
              exit 1
              ;;
          esac

          python3 - update-response.json <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as f:
              response = json.load(f)
          if response.get("code") not in (0, 200):
              raise SystemExit(f"component update failed: {response}")
          PY

  cleanup-runner-artifacts:
    runs-on: self-macos-runner
    needs: [package, upload-backend-component]
    if: ${{ always() }}
    steps:
      - name: Disable residual sparse-checkout
        # Self-hosted workspaces with clean:false can keep a previous job's
        # sparse-checkout config and hide scripts/ci-self-hosted.sh.
        run: |
          if [ -e .git ]; then
            git sparse-checkout disable 2>/dev/null || true
            git config --local --unset-all core.sparseCheckout 2>/dev/null || true
            if [ -d .git ]; then
              rm -f .git/info/sparse-checkout
            elif [ -f .git ]; then
              gitdir=$(sed -n 's/^gitdir: //p' .git)
              rm -f "${gitdir}/info/sparse-checkout" 2>/dev/null || true
            fi
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          clean: false

      - name: Prune Runner Artifacts
        run: scripts/ci-self-hosted.sh prune-artifact-runs 3

  notify:
    name: Notify Feishu
    # Stay on the Component macOS runner pool; do not hop to Windows.
    runs-on: self-macos-runner
    needs: [resolve-source, package, upload-backend-component]
    if: ${{ always() }}
    env:
      FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
    steps:
      - name: Checkout notify helper
        uses: actions/checkout@v6
        with:
          # Full tree; avoid sparse residue on the shared macOS runner.
          clean: true

      - name: Notify Feishu on failure
        if: ${{ needs.package.result != 'success' || needs.upload-backend-component.result != 'success' }}
        run: |
          set -euo pipefail
          chmod +x scripts/ci-feishu.sh
          failed=()
          [[ '${{ needs.resolve-source.result }}' == 'success' ]] || failed+=('resolve-source')
          [[ '${{ needs.package.result }}' == 'success' ]] || failed+=('package')
          [[ '${{ needs.upload-backend-component.result }}' == 'success' ]] || failed+=('upload-backend-component')
          if ((${#failed[@]} > 0)); then
            failed_jobs=$(IFS=', '; echo "${failed[*]}")
          else
            failed_jobs='unknown'
          fi
          run_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          md="$(printf '%s\n' \
            "**$(scripts/ci-feishu.sh label repo):** ${{ github.repository }}" \
            "**$(scripts/ci-feishu.sh label trigger_ref):** ${{ inputs.source_ref }}" \
            "**$(scripts/ci-feishu.sh label publish_env):** ${{ inputs.api_environment }}" \
            "**$(scripts/ci-feishu.sh label source_sha):** \`${{ needs.resolve-source.outputs.source_sha }}\`" \
            "**$(scripts/ci-feishu.sh label pkg_name):** ${{ needs.resolve-source.outputs.package_name }}" \
            "**$(scripts/ci-feishu.sh label author):** ${{ github.actor }}" \
            "**$(scripts/ci-feishu.sh label failed_jobs):** ${failed_jobs}" \
            "**$(scripts/ci-feishu.sh label run_link):** [$(scripts/ci-feishu.sh label view_detail)](${run_url})")"
          scripts/ci-feishu.sh send-card-v1 \
            "${FEISHU_WEBHOOK_URL}" \
            "$(scripts/ci-feishu.sh label pub_fail)" \
            red \
            "${md}"

      - name: Notify Feishu on success
        if: ${{ needs.package.result == 'success' && needs.upload-backend-component.result == 'success' }}
        run: |
          set -euo pipefail
          chmod +x scripts/ci-feishu.sh
          run_url='${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
          md="$(printf '%s\n' \
            "**$(scripts/ci-feishu.sh label pkg_name):** ${{ needs.resolve-source.outputs.package_name }}" \
            "**Artifact:** \`${{ needs.resolve-source.outputs.artifact_name }}\`" \
            "**$(scripts/ci-feishu.sh label trigger_ref):** ${{ inputs.source_ref }}" \
            "**$(scripts/ci-feishu.sh label source_sha):** \`${{ needs.resolve-source.outputs.source_sha }}\`" \
            "**$(scripts/ci-feishu.sh label publish_env):** ${{ needs.resolve-source.outputs.upload_target_names }}" \
            "**$(scripts/ci-feishu.sh label author):** ${{ github.actor }}" \
            "**$(scripts/ci-feishu.sh label note):** $(scripts/ci-feishu.sh label component_note)" \
            "" \
            "**$(scripts/ci-feishu.sh label run_link):** [$(scripts/ci-feishu.sh label view_detail)](${run_url})")"
          scripts/ci-feishu.sh send-card-v1 \
            "${FEISHU_WEBHOOK_URL}" \
            "$(scripts/ci-feishu.sh label pub_ok)" \
            green \
            "${md}"
