name: DXMT Nightly Component

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: dxmt-nightly-component-${{ github.ref }}
  cancel-in-progress: true

env:
  DXMT_CI_ROOT: /opt/dxmt-ci
  LLVM_VERSION: llvmorg-15.0.7
  WINE_VERSION: proton-11.0-macos
  WINE_GIT_URL: https://github.com/gamesir123/wine-proton-macos.git
  WINE_GIT_BRANCH: proton-11.0-macos
  HOMEBREW_NO_AUTO_UPDATE: "1"
  HOMEBREW_NO_INSTALL_CLEANUP: "1"

jobs:
  setup-host:
    runs-on: self-macos-runner
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Probe and Prepare Host
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh setup-host

  setup-wine:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare Wine
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
          WINE_ACCESS_TOKEN: ${{ secrets.WINE_ACCESS_TOKEN }}
        run: |
          case "${WINE_ACCESS_TOKEN}" in
            ghp_*) echo "Wine token kind: classic" ;;
            github_pat_*) echo "Wine token kind: fine-grained" ;;
            "") echo "::error::WINE_ACCESS_TOKEN is empty"; exit 1 ;;
            *) echo "Wine token kind: unknown" ;;
          esac
          scripts/ci-self-hosted.sh ensure-wine x86_64

  setup-llvm-project:
    runs-on: self-macos-runner
    needs: setup-host
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare LLVM Source
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh ensure-llvm-project

  setup-llvm-darwin:
    runs-on: self-macos-runner
    needs: setup-llvm-project
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare LLVM Darwin x86_64
        env:
          MAC_RUNNER_SUDO_PASS: ${{ secrets.MAC_RUNNER_SUDO_PASS }}
        run: scripts/ci-self-hosted.sh ensure-llvm-darwin x86_64

  build-x86_64-windows:
    runs-on: self-macos-runner
    needs: [setup-wine, setup-llvm-darwin]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build x86_64 Wine Builtin Runtime
        run: |
          short_sha="$(git rev-parse --short=7 HEAD)"
          dxmt_version="${short_sha}"
          scripts/ci-self-hosted.sh prepare-job
          scripts/ci-self-hosted.sh link-toolchains x86_64
          scripts/ci-self-hosted.sh prepare-ccache component-x86_64 x86_64-w64-mingw32-gcc x86_64-w64-mingw32-g++
          meson setup --cross-file build-win64.txt \
            -Denable_nvapi=true \
            -Denable_nvngx=true \
            -Ddxmt_version="${dxmt_version}" \
            -Dnative_llvm_path=toolchains/llvm-darwin \
            -Dwine_build_path= -Dwine_install_path=toolchains/wine \
            --buildtype release \
            --prefix "$(pwd)/install" \
            --strip \
            build
          meson compile -C build
          meson install -C build
          find install -name '*.a' -delete
          ccache --show-stats
          scripts/ci-self-hosted.sh stage-artifact component-x86_64-runtime install

  build-x86-windows:
    runs-on: self-macos-runner
    needs: setup-wine
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: true

      - name: Build x86 Wine Builtin Runtime
        run: |
          short_sha="$(git rev-parse --short=7 HEAD)"
          dxmt_version="${short_sha}"
          scripts/ci-self-hosted.sh prepare-job
          scripts/ci-self-hosted.sh link-toolchains x86_64
          scripts/ci-self-hosted.sh prepare-ccache component-x86 i686-w64-mingw32-gcc i686-w64-mingw32-g++
          meson setup --cross-file build-win32.txt \
            -Ddxmt_version="${dxmt_version}" \
            -Dwine_build_path= -Dwine_install_path=toolchains/wine \
            --buildtype release \
            --prefix "$(pwd)/install" \
            --strip \
            build
          meson compile -C build
          meson install -C build
          find install -name '*.a' -delete
          ccache --show-stats
          scripts/ci-self-hosted.sh stage-artifact component-x86-runtime install

  package-and-upload:
    runs-on: self-macos-runner
    needs: [build-x86_64-windows, build-x86-windows]
    env:
      CIAUTH_TOKEN: ${{ secrets.BACKEND_UPDATE_TOKEN }}
      COMPONENT_NAME: dxmt-nightly
      DEV_COMPONENT_UPLOAD_URL: ${{ secrets.DEV_COMPONENT_UPLOAD_URL }}
      DEV_COMPONENT_UPDATE_BASE_URL: ${{ secrets.DEV_COMPONENT_UPDATE_BASE_URL }}
      DEV_COMPONENT_ID: ${{ secrets.DEV_COMPONENT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Compute Package Version
        id: version
        run: |
          short_sha="$(git rev-parse --short=7 HEAD)"
          package_name="${COMPONENT_NAME}-${short_sha}"
          echo "short_sha=${short_sha}" >> "$GITHUB_OUTPUT"
          echo "package_name=${package_name}" >> "$GITHUB_OUTPUT"
          echo "package_file=dist/${package_name}.tzst" >> "$GITHUB_OUTPUT"

      - name: Assemble Component Package
        run: |
          package_name="${{ steps.version.outputs.package_name }}"
          package_root="./combined/${package_name}"
          rm -rf ./combined ./dist
          mkdir -p "${package_root}/wine" ./dist

          scripts/ci-self-hosted.sh copy-artifact component-x86_64-runtime "${package_root}/wine"
          scripts/ci-self-hosted.sh copy-artifact component-x86-runtime "${package_root}/wine"
          find "${package_root}" -name '*.a' -delete

          python3 - "${package_root}/manifest.json" "${package_name}" <<'PY'
          import json
          import sys

          manifest_path, package_name = sys.argv[1:]
          manifest = {
              "id": package_name,
              "name": package_name,
              "version": package_name,
              "link_unix_libs": [
                  "${COMPONENT_PATH}/wine/x86_64-unix",
              ],
              "link_windows_dlls": [
                  "${COMPONENT_PATH}/wine/i386-windows",
                  "${COMPONENT_PATH}/wine/x86_64-windows",
              ],
              "environment_template": {
                  "WINEDLLPATH": "${COMPONENT_PATH}/wine",
              },
          }
          with open(manifest_path, "w", encoding="utf-8") as f:
              json.dump(manifest, f, indent=2)
              f.write("\n")
          PY

      - name: Verify Component Package Layout
        run: |
          package_root="./combined/${{ steps.version.outputs.package_name }}"
          test -f "${package_root}/manifest.json"
          test -d "${package_root}/wine/i386-windows"
          test -d "${package_root}/wine/x86_64-windows"
          test -d "${package_root}/wine/x86_64-unix"
          test -f "${package_root}/wine/i386-windows/dxgi.dll"
          test -f "${package_root}/wine/x86_64-windows/dxgi.dll"
          test -f "${package_root}/wine/x86_64-unix/winemetal.so"
          find "${package_root}" -maxdepth 1 -mindepth 1 \
            ! -name manifest.json \
            ! -name wine \
            -exec sh -c 'echo "unexpected package entry: $1" >&2; exit 1' sh {} \;

      - name: Create Component Archive
        run: |
          if ! command -v zstd >/dev/null 2>&1; then
            brew install --formula zstd
          fi
          package_name="${{ steps.version.outputs.package_name }}"
          package_file="${{ steps.version.outputs.package_file }}"
          tar -cf - -C ./combined "${package_name}" | zstd -T0 -19 -o "${package_file}"
          case "${package_file}" in
            *.tzst) ;;
            *) echo "::error::component archive must end with .tzst"; exit 1 ;;
          esac
          zstd -t "${package_file}"
          shasum -a 256 "${package_file}" > "${package_file}.sha256"

      - name: Upload GitHub Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.version.outputs.package_name }}
          path: |
            ${{ steps.version.outputs.package_file }}
            ${{ steps.version.outputs.package_file }}.sha256
          if-no-files-found: error
          retention-days: 14

      - name: Upload And Update Backend Component
        run: |
          test -n "${CIAUTH_TOKEN}" || { echo "::error::BACKEND_UPDATE_TOKEN is empty"; exit 1; }
          test -n "${DEV_COMPONENT_UPLOAD_URL}" || { echo "::error::DEV_COMPONENT_UPLOAD_URL is empty"; exit 1; }
          test -n "${DEV_COMPONENT_UPDATE_BASE_URL}" || { echo "::error::DEV_COMPONENT_UPDATE_BASE_URL is empty"; exit 1; }
          test -n "${DEV_COMPONENT_ID}" || { echo "::error::DEV_COMPONENT_ID is empty"; exit 1; }

          package_file="${{ steps.version.outputs.package_file }}"
          case "${package_file}" in
            *.tzst) ;;
            *) echo "::error::component archive must end with .tzst"; exit 1 ;;
          esac

          print_response_body() {
            local label="$1"
            local response_path="$2"
            if [[ -s "${response_path}" ]]; then
              echo "::group::${label} response body"
              cat "${response_path}"
              echo
              echo "::endgroup::"
            else
              echo "::warning::${label} response body is empty"
            fi
          }

          upload_status="$(curl -sS -X POST "${DEV_COMPONENT_UPLOAD_URL}" \
            -H "CIAuth-Token: ${CIAUTH_TOKEN}" \
            -F "file=@${package_file}" \
            -F "dir=emulator" \
            -o upload-response.json \
            -w '%{http_code}')" || {
            curl_exit="$?"
            echo "::error::upload request failed with curl exit ${curl_exit}"
            print_response_body "upload" upload-response.json
            exit "${curl_exit}"
          }

          case "${upload_status}" in
            2??) ;;
            *)
              echo "::error::upload request failed with HTTP ${upload_status}"
              print_response_body "upload" upload-response.json
              exit 1
              ;;
          esac

          python3 - upload-response.json component-update.json <<'PY'
          import json
          import sys

          upload_response_path, payload_path = sys.argv[1:]
          with open(upload_response_path, "r", encoding="utf-8") as f:
              response = json.load(f)

          if response.get("code") not in (0, 200):
              raise SystemExit(f"upload failed: {response}")

          data = response.get("data") or {}
          url = data.get("url")
          file_name = data.get("file_name")
          file_size = data.get("file_size")
          sha256 = data.get("sha256")

          if not url or not file_name or file_size is None or not sha256:
              raise SystemExit(f"upload response missing file metadata: {response}")
          if not str(file_name).endswith(".tzst"):
              raise SystemExit(f"uploaded file name must end with .tzst: {file_name}")

          payload = {
              "name": "dxmt-nightly",
              "display_name": "dxmt-nightly",
              "type": 3,
              "version": "1.0.0",
              "version_code": 9,
              "status": 1,
              "is_base": 0,
              "base_type": 0,
              "is_default": 0,
              "is_ui": 1,
              "weight": 0,
              "filter": {
                  "labels": {
                      "platform-MAC": "Mac端",
                  },
              },
              "blurb": "dxmt的nightly版本",
              "logo": "https://test-gamemac-cdn.mx520.com/uploads/emulator/20260424/b7486e45241b4b4282537c682b5d3ff3.png",
              "lang_param": {},
              "gpu_range": "",
              "download_url": url,
              "download_url_en": url,
              "file_name": file_name,
              "file_name_en": file_name,
              "file_size": str(file_size),
              "file_size_en": str(file_size),
              "file_sha256": sha256,
              "file_sha256_en": sha256,
          }

          with open(payload_path, "w", encoding="utf-8") as f:
              json.dump(payload, f, ensure_ascii=False, indent=2)
              f.write("\n")
          PY

          update_status="$(curl -sS -X PUT "${DEV_COMPONENT_UPDATE_BASE_URL%/}/${DEV_COMPONENT_ID}" \
            -H "CIAuth-Token: ${CIAUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            --data-binary @component-update.json \
            -o update-response.json \
            -w '%{http_code}')" || {
            curl_exit="$?"
            echo "::error::component update request failed with curl exit ${curl_exit}"
            print_response_body "component update" update-response.json
            exit "${curl_exit}"
          }

          case "${update_status}" in
            2??) ;;
            *)
              echo "::error::component update request failed with HTTP ${update_status}"
              print_response_body "component update" update-response.json
              exit 1
              ;;
          esac

          python3 - update-response.json <<'PY'
          import json
          import sys

          with open(sys.argv[1], "r", encoding="utf-8") as f:
              response = json.load(f)
          if response.get("code") not in (0, 200):
              raise SystemExit(f"component update failed: {response}")
          PY

      - name: Stage Local Component Artifact
        if: always()
        run: |
          if [[ -f "${{ steps.version.outputs.package_file }}" ]]; then
            scripts/ci-self-hosted.sh stage-files "${{ steps.version.outputs.package_name }}" \
              "${{ steps.version.outputs.package_file }}" \
              "${{ steps.version.outputs.package_file }}.sha256"
          fi
